# ║  NO SERVER NEEDED — GitHub hosts all runners for free                   ║
# ║  Runs daily at 2am IST automatically                                    ║
# ╚══════════════════════════════════════════════════════════════════════════╝

name: ⚡ Update Metrics & Animations

on:
  schedule:
    - cron: "30 20 * * *"   # 2:00 AM IST daily (UTC 20:30)
  workflow_dispatch:          # also runnable manually from Actions tabdd
  push:
    branches: [main]

jobs:

  # ── JOB 1: Full base metrics card ───────────────────────────────────────
  metrics-base:
    name: 📊 Base Metrics
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          config_display: large

  # ── JOB 2: 3D Isometric full-year calendar ──────────────────────────────
  metrics-isocalendar:
    name: 📅 3D Isometric Calendar
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.plugin.isocalendar.fullyear.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

  # ── JOB 3: Languages in-depth (actual lines, not just file count) ────────
  metrics-languages:
    name: 🈷️ Languages Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.plugin.languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: lines, bytes-size, percentage
          plugin_languages_limit: 10
          plugin_languages_analysis_timeout: 15

  # ── JOB 4: Achievements (GitHub unlockable badges) ───────────────────────
  metrics-achievements:
    name: 🏆 Achievements
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.plugin.achievements.svg
          base: ""
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_limit: 0

  # ── JOB 5: Coding habits (when you code, most active hours, facts) ───────
  metrics-habits:
    name: 💡 Coding Habits
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.plugin.habits.svg
          base: ""
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes

  # ── JOB 6: Stargazers growth chart ──────────────────────────────────────
  metrics-stargazers:
    name: ✨ Stargazers
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.plugin.stargazers.svg
          base: ""
          plugin_stargazers: yes
          plugin_stargazers_charts: yes

  # ── JOB 7: Contribution snake animation ─────────────────────────────────
  snake:
    name: 🐍 Snake Animation
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Sandy-7061
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake.svg?palette=github
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── JOB 8: 3D contribution graph (night rainbow theme) ──────────────────
  3d-graph:
    name: 🌐 3D Contribution Graph
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: Sandy-7061
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: profile-3d-contrib
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}